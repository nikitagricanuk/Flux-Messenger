openapi: 3.1.0
info:
  title: Flux Messenger
  description: Flux Messenger
  version: v1
servers:
  - url: 'https'
paths:
    /auth/login:
        post:
            summary: Login
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                password:
                                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error
    /auth/register:
        post:
            summary: Register
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                password:
                                    type: string
                                name:
                                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error

    /auth/users/me:
        get:
            summary: Get current user
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    email:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error

    /auth/users/{user_id}:
        get:
            summary: Get user by ID
            parameters:
                - in: path
                  name: user_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    email:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

        patch:
            summary: Update user by ID
            parameters:
                - in: path
                  name: user_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                email:
                                    type: string
                                password:
                                    type: string
                                name:
                                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    email:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

        delete:
            summary: Delete user by ID
            parameters:
                - in: path
                  name: user_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

    /chats:
        get:
            summary: Get all chats for current user
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        id:
                                            type: string
                                        name:
                                            type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error

        post:
            summary: Create a new chat
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                type:
                                    type: string
                                members:
                                    type: array
                                    items:
                                        type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '500':
                    description: Internal Server Error

    /chats/{chat_id}:
        get:
            summary: Get chat by ID
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

        patch:
            summary: Update chat by ID
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                name:
                                    type: string
                                members:
                                    type: array
                                    items:
                                        type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    name:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

        delete:
            summary: Delete chat by ID
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

    /chat/{chat_id}/messages:
        get:
            summary: Get all messages for a chat
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: object
                                    properties:
                                        id:
                                            type: string
                                        content:
                                            type: string
                                        sender_id:
                                            type: string
                                        timestamp:
                                            type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

        post:
            summary: Create a new message in a chat (debug only)
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                content:
                                    type: string
            responses:
                '200':
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    id:
                                        type: string
                                    content:
                                        type: string
                                    sender_id:
                                        type: string
                                    timestamp:
                                        type: string
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error

    /chat/{chat_id}/messages/{message_id}:
        delete:
            summary: Delete a message by ID (debug only)
            parameters:
                - in: path
                  name: chat_id
                  required: true
                  schema:
                    type: string
                - in: path
                  name: message_id
                  required: true
                  schema:
                    type: string
            responses:
                '200':
                    description: OK
                '400':
                    description: Bad Request
                '401':
                    description: Unauthorized
                '404':
                    description: Not Found
                '500':
                    description: Internal Server Error