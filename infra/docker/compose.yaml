services:
  postgres:
    image: mirror.gcr.io/postgres:18
    container_name: flux-postgres
    environment:
      POSTGRES_DB: flux
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: flux-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flux
      SPRING_DATASOURCE_USERNAME: flux
      SPRING_DATASOURCE_PASSWORD: flux
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: