services:
  postgres:
    image: mirror.gcr.io/postgres:18
    container_name: flux-postgres
    environment:
      POSTGRES_DB: flux
      POSTGRES_USER: flux
      POSTGRES_PASSWORD: flux
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: mirror.gcr.io/minio/minio
    container_name: flux-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - media-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: flux-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flux
      SPRING_DATASOURCE_USERNAME: flux
      SPRING_DATASOURCE_PASSWORD: flux
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://10.0.2.2:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: avatars
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres-data:
  media-data: