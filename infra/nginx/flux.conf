server {
    listen 80;
    server_name flux.nikitagricanuk.ru;

    client_max_body_size 10M;

    location = /.well-known/assetlinks.json {
        proxy_pass http://localhost:8081/.well-known/assetlinks.json;

        # Spring Boot / Spring Security emit their own Content-Type,
        # Cache-Control, Pragma and Expires. Strip them so we can emit
        # exactly one of each — Google Play Services' FIDO fetcher
        # rejects responses with duplicate Content-Type headers.
        proxy_hide_header Content-Type;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;

        add_header Content-Type "application/json" always;
        add_header Cache-Control "public, max-age=3600" always;
        access_log off;
    }

    location / {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name cdn.flux.nikitagricanuk.ru;

    client_max_body_size 100M;

    location / {
        proxy_pass http://localhost:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}
