spring:
  application:
    name: flux

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  security:
    user:
      name: dev
      password: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/flux
    username: flux
    password: flux

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

storage:
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-url: ${MINIO_PUBLIC_URL:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:avatars}

jwt:
  secret: ${JWT_SECRET:my-super-secure-secret-key-for-jwt-signing-12345}
  expiration-ms: 900000
  refresh-expiration-ms: 604800000
  registration-expiration-ms: 600000

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}

webauthn:
  rp-id: ${WEBAUTHN_RP_ID:localhost}
  rp-name: Flux Messenger
  origin: ${WEBAUTHN_ORIGIN:http://localhost:8080}