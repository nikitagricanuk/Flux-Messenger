spring:
  datasource:
    url: jdbc:h2:mem:flux-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

jwt:
  secret: test-secret-key-for-unit-tests-must-be-long-enough-to-satisfy-hmac-sha256
  expiration-ms: 900000
  refresh-expiration-ms: 604800000
  registration-expiration-ms: 600000

oauth:
  google:
    client-id: test-google-client-id
  github:
    client-id: test-github-client-id
    client-secret: test-github-client-secret

webauthn:
  rp-id: localhost
  rp-name: Flux Messenger Test
  origin: http://localhost:8080
