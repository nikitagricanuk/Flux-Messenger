name: Deploy Backend

on:
  workflow_run:
    workflows: ["Build Backend"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Copy compose file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "infra/docker/compose.prod.yaml"
          target: /home/deploy/flux
          strip_components: 2
          overwrite: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            mkdir -p $HOME/flux
            cd $HOME/flux

            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "APP_IMAGE=${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}" > .env.deploy

            docker compose -f compose.prod.yaml down 2>/dev/null || true
            docker rm -f flux-backend flux-postgres flux-minio 2>/dev/null || true

            docker compose -f compose.prod.yaml --env-file .env.deploy up -d

            docker image prune -f