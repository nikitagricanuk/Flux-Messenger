name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x apps/android/gradlew
    - name: Build with Gradle
      run: cd apps/android && ./gradlew :app:assembleDebug -PbackendBaseUrl=https://flux.nikitagricanuk.ru/

    - name: Upload APK
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: flux-debug-${{ github.sha }}
        path: apps/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
